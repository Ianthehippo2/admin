<!DOCTYPE html>
<html>
<head>
  <title>12 Auto Connect Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    button {
      width: 260px;
      margin: 12px;
      padding: 18px;
      font-size: 1.4rem;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      color: white;
      cursor: pointer;
    }

    .live { background: red; }
    .offline { background: #23647D; }
  </style>
</head>
<body>
  <h1>12 Auto Connect Control Panel</h1>

  <button class="live" onclick="setLive(true)">GO 12</button>
  <button class="offline" onclick="setLive(false)">GO SW</button>

  <p id="status">Ready</p>
<h2>Firework Control</h2>

<button onclick="changeFireworks(-1)">Reset Previous</button>
<button onclick="changeFireworks(1)">Fire</button>

<p id="fireworkStatus">Fireworks Ready</p>
<p id="currentFireworkCount">Current: Loading...</p>
  <h2>Letter Day Control</h2>

<select id="letterDaySelect">
  <option value="A">A Day</option>
  <option value="B">B Day</option>
  <option value="C">C Day</option>
  <option value="D">D Day</option>
  <option value="E">E Day</option>
  <option value="F">F Day</option>
</select>

<button onclick="setLetterDay()">Update Letter Day</button>

<p id="letterDayStatus">Letter Day Ready</p>
  <script>
  const STATUS_URL = "https://schooled-live-status-default-rtdb.firebaseio.com/live.json";

  async function setLive(value) {
    const status = document.getElementById("status");

    try {
      const response = await fetch(STATUS_URL, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(value)
      });

      if (!response.ok) {
        throw new Error("Firebase rejected the request");
      }

      status.textContent = value ? "Changed to Live" : "Changed to Offline";
    } catch (error) {
      status.textContent = "ERROR: Could not update status";
      console.error(error);
    }
  }
const FIREWORK_URL = "https://schooled-live-status-default-rtdb.firebaseio.com/fireworksDimmed.json";

  async function changeFireworks(amount) {
    const status = document.getElementById("fireworkStatus");

    try {
      const response = await fetch(FIREWORK_URL + "?t=" + Date.now());
      let current = await response.json();

      current = current || 0;
      current += amount;

      if (current < 0) current = 0;
      if (current > 14) current = 14;

      await fetch(FIREWORK_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(current)
      });

      status.textContent = current + " fireworks dimmed";
    } catch {
      status.textContent = "ERROR updating fireworks";
    }
  }
async function loadFireworkCount() {
  const countBox = document.getElementById("currentFireworkCount");

  try {
    const response = await fetch(FIREWORK_URL + "?t=" + Date.now());
    let current = await response.json();

    current = current || 0;

    countBox.textContent = "Current: " + current + " / 14 fireworks dimmed";
  } catch {
    countBox.textContent = "Current: Error loading count";
  }
}

loadFireworkCount();
setInterval(loadFireworkCount, 5000);
    const LETTER_DAY_URL = "https://schooled-live-status-default-rtdb.firebaseio.com/letterDay.json";

async function setLetterDay() {
  const day = document.getElementById("letterDaySelect").value;

  await fetch(LETTER_DAY_URL, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(day)
  });

  document.getElementById("letterDayStatus").textContent =
    "Changed to " + day + " Day";
}

async function loadLetterDay() {
  try {
    const response = await fetch(LETTER_DAY_URL + "?t=" + Date.now());
    const day = await response.json();

    if (day) {
      document.getElementById("letterDaySelect").value = day;
      document.getElementById("letterDayStatus").textContent =
        "Current: " + day + " Day";
    }
  } catch {}
}

loadLetterDay();
setInterval(loadLetterDay, 5000);
</script>
</body>
</html>
