<!DOCTYPE html>
<html>
<head>
  <title>12 Auto Connect Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #89CFF0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    button {
      width: 260px;
      margin: 12px;
      padding: 18px;
      font-size: 1.4rem;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      color: white;
      cursor: pointer;
    }

    .live { background: red; }
    .offline { background: #23647D; }
  </style>
</head>
<body>
  <h1>12 Auto Connect Control Panel</h1>

  <button class="live" onclick="setLive(true)">GO 12</button>
  <button class="offline" onclick="setLive(false)">GO SW</button>

  <p id="status">Ready</p>

  <script>
  const STATUS_URL = "https://schooled-live-status-default-rtdb.firebaseio.com/live.json";

  async function setLive(value) {
    const status = document.getElementById("status");

    try {
      const response = await fetch(STATUS_URL, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(value)
      });

      if (!response.ok) {
        throw new Error("Firebase rejected the request");
      }

      status.textContent = value ? "12 Nominal" : "Changed to SW";
    } catch (error) {
      status.textContent = "ERROR: Could not update status";
      console.error(error);
    }
  }
</script>
</body>
</html>
